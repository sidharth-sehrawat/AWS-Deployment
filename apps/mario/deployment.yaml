apiVersion: apps/v1
kind: Deployment
metadata:
  name: mario
  namespace: mario
spec:
  replicas: 2

  selector:
    matchLabels:
      app: mario

  template:
    metadata:
      labels:
        app: mario

    spec:
      containers:
      - name: mario

        image: 172121199482.dkr.ecr.ap-south-1.amazonaws.com/mario:v1

        ports:
        - containerPort: 8080
